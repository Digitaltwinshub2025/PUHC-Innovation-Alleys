<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhino 3DM Viewer</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0f1a; color: #e0e6ed; font-family: 'Segoe UI', sans-serif;
        overflow: hidden; height: 100vh;
    }
    #toolbar {
        position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        background: rgba(10, 15, 26, 0.95); border-bottom: 1px solid rgba(10, 189, 198, 0.2);
        padding: 10px 20px; display: flex; align-items: center; gap: 12px;
    }
    #toolbar h1 {
        font-size: 1rem; font-weight: 600; color: #0abdc6; margin-right: 20px;
    }
    .btn {
        padding: 6px 14px; border-radius: 5px; font-size: .8rem; font-weight: 600;
        cursor: pointer; border: 1px solid rgba(10, 189, 198, 0.3); background: rgba(10, 189, 198, 0.1);
        color: #0abdc6; transition: all .2s;
    }
    .btn:hover { background: rgba(10, 189, 198, 0.25); }
    .btn.active { background: rgba(10, 189, 198, 0.3); border-color: #0abdc6; }
    #fileInput { display: none; }
    #status {
        position: fixed; bottom: 20px; left: 20px; z-index: 100;
        background: rgba(10, 15, 26, 0.9); border: 1px solid rgba(10, 189, 198, 0.2);
        border-radius: 6px; padding: 10px 16px; font-size: .75rem; color: #8b95a5;
        max-width: 400px;
    }
    #status .highlight { color: #0abdc6; font-weight: 600; }
    #loading {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 200; text-align: center; display: none;
    }
    #loading .spinner {
        width: 40px; height: 40px; border: 3px solid rgba(10, 189, 198, 0.2);
        border-top-color: #0abdc6; border-radius: 50%; animation: spin 1s linear infinite;
        margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #canvas3d { width: 100%; height: 100vh; display: block; }
    #dropzone {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 50; text-align: center; pointer-events: none;
    }
    #dropzone .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
    #dropzone .text { font-size: 1rem; color: #8b95a5; }
    #dropzone .sub { font-size: .8rem; color: #5a6474; margin-top: 6px; }
    #viewInfo {
        position: fixed; top: 55px; right: 20px; z-index: 100;
        background: rgba(10, 15, 26, 0.9); border: 1px solid rgba(10, 189, 198, 0.2);
        border-radius: 6px; padding: 10px 16px; font-size: .7rem; color: #8b95a5;
    }
</style>
</head>
<body>

<div id="toolbar">
    <h1>Rhino 3DM Viewer</h1>
    <label class="btn" for="fileInput">Load .3dm File</label>
    <input type="file" id="fileInput" accept=".3dm">
    <button class="btn" id="btnFront" title="Front View">Front</button>
    <button class="btn" id="btnRight" title="Right View">Right</button>
    <button class="btn" id="btnTop" title="Top View">Top</button>
    <button class="btn" id="btnPerspective" title="Perspective View">Perspective</button>
    <button class="btn" id="btnFit">Fit All</button>
    <button class="btn" id="btnScreenshot">Export PNG</button>
    <button class="btn" id="btnLoadBuilding5">Load Building 5</button>
</div>

<div id="dropzone">
    <div class="icon">&#9651;</div>
    <div class="text">Load a Rhino .3dm file to view</div>
    <div class="sub">Click "Load .3dm File" or drag and drop</div>
</div>

<div id="loading">
    <div class="spinner"></div>
    <div style="color: #0abdc6; font-size: .85rem;">Loading 3DM file...</div>
</div>

<div id="status"></div>
<div id="viewInfo"></div>

<canvas id="canvas3d"></canvas>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Rhino3dmLoader } from 'three/addons/loaders/3DMLoader.js';

// Scene setup
const canvas = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x0a0f1a);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();

// Perspective camera for 3D views
const perspectiveCamera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
perspectiveCamera.position.set(50, 30, 50);

// Orthographic camera for 2D views
const aspect = window.innerWidth / window.innerHeight;
const frustumSize = 100;
const orthographicCamera = new THREE.OrthographicCamera(
    frustumSize * aspect / -2, frustumSize * aspect / 2,
    frustumSize / 2, frustumSize / -2,
    0.1, 10000
);
orthographicCamera.position.set(0, 0, 100);

// Start with perspective camera
let camera = perspectiveCamera;
let isOrthographic = false;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight1.position.set(50, 80, 50);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x88aacc, 0.4);
dirLight2.position.set(-30, 40, -20);
scene.add(dirLight2);

// Grid
const gridHelper = new THREE.GridHelper(200, 40, 0x1a2a3a, 0x0d1520);
scene.add(gridHelper);

// Rhino loader
const loader = new Rhino3dmLoader();
loader.setLibraryPath('https://cdn.jsdelivr.net/npm/rhino3dm@8.4.0/');

let loadedObject = null;
let boundingBox = null;

function updateStatus(text) {
    document.getElementById('status').innerHTML = text;
}

function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
}

function hideDropzone() {
    document.getElementById('dropzone').style.display = 'none';
}

function loadFile(arrayBuffer, filename) {
    showLoading(true);
    hideDropzone();

    if (loadedObject) {
        scene.remove(loadedObject);
        loadedObject = null;
    }

    loader.parse(arrayBuffer, function(object) {
        loadedObject = object;
        scene.add(object);

        // Compute bounding box
        boundingBox = new THREE.Box3().setFromObject(object);
        const center = boundingBox.getCenter(new THREE.Vector3());
        const size = boundingBox.getSize(new THREE.Vector3());

        // Center the model
        object.position.sub(center);
        boundingBox = new THREE.Box3().setFromObject(object);

        // Update controls target
        controls.target.set(0, 0, 0);

        // Fit camera
        fitCamera();

        // Count objects
        let meshCount = 0, lineCount = 0, pointCount = 0;
        object.traverse(function(child) {
            if (child.isMesh) meshCount++;
            else if (child.isLine) lineCount++;
            else if (child.isPoints) pointCount++;
        });

        showLoading(false);
        updateStatus(
            '<span class="highlight">' + filename + '</span> loaded<br>' +
            'Size: ' + size.x.toFixed(1) + ' x ' + size.y.toFixed(1) + ' x ' + size.z.toFixed(1) + '<br>' +
            'Objects: ' + meshCount + ' meshes, ' + lineCount + ' lines, ' + pointCount + ' points'
        );
    }, function(error) {
        showLoading(false);
        updateStatus('Error loading file: ' + error.message);
        console.error('Error:', error);
    });
}

function fitCamera() {
    if (!loadedObject) return;
    const box = new THREE.Box3().setFromObject(loadedObject);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const fov = camera.fov * (Math.PI / 180);
    let dist = maxDim / (2 * Math.tan(fov / 2));
    dist *= 1.5;

    const center = box.getCenter(new THREE.Vector3());
    controls.target.copy(center);

    const dir = camera.position.clone().sub(controls.target).normalize();
    camera.position.copy(controls.target).add(dir.multiplyScalar(dist));
    camera.updateProjectionMatrix();
    controls.update();
}

function setView(name) {
    if (!loadedObject) return;
    const box = new THREE.Box3().setFromObject(loadedObject);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);

    // Switch to orthographic for 2D views, perspective for 3D
    if (name === 'perspective') {
        camera = perspectiveCamera;
        isOrthographic = false;
        controls.object = perspectiveCamera;
        
        controls.target.copy(center);
        camera.position.set(center.x + maxDim * 0.7, center.y + maxDim * 0.5, center.z + maxDim * 0.7);
        camera.lookAt(center);
        camera.updateProjectionMatrix();
    } else {
        camera = orthographicCamera;
        isOrthographic = true;
        controls.object = orthographicCamera;
        
        // Adjust orthographic frustum to fit model
        const aspect = window.innerWidth / window.innerHeight;
        const zoom = maxDim * 0.6;
        orthographicCamera.left = -zoom * aspect;
        orthographicCamera.right = zoom * aspect;
        orthographicCamera.top = zoom;
        orthographicCamera.bottom = -zoom;
        orthographicCamera.updateProjectionMatrix();
        
        controls.target.copy(center);
        
        switch(name) {
            case 'front':
                // Look at facade from front (negative Y direction)
                camera.position.set(center.x, center.y - maxDim * 2, center.z);
                camera.up.set(0, 0, 1);
                break;
            case 'right':
                // Look from positive X direction
                camera.position.set(center.x + maxDim * 2, center.y, center.z);
                camera.up.set(0, 0, 1);
                break;
            case 'top':
                // Look down from above
                camera.position.set(center.x, center.y, center.z + maxDim * 2);
                camera.up.set(0, 1, 0);
                break;
        }
        camera.lookAt(center);
    }
    
    controls.update();
    document.getElementById('viewInfo').textContent = name.charAt(0).toUpperCase() + name.slice(1) + ' View (' + (isOrthographic ? 'Orthographic' : 'Perspective') + ')';
}

// File input
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(evt) {
        loadFile(evt.target.result, file.name);
    };
    reader.readAsArrayBuffer(file);
});

// Drag and drop
document.body.addEventListener('dragover', function(e) { e.preventDefault(); });
document.body.addEventListener('drop', function(e) {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.3dm')) {
        const reader = new FileReader();
        reader.onload = function(evt) {
            loadFile(evt.target.result, file.name);
        };
        reader.readAsArrayBuffer(file);
    }
});

// View buttons
document.getElementById('btnFront').addEventListener('click', function() { setView('front'); });
document.getElementById('btnRight').addEventListener('click', function() { setView('right'); });
document.getElementById('btnTop').addEventListener('click', function() { setView('top'); });
document.getElementById('btnPerspective').addEventListener('click', function() { setView('perspective'); });
document.getElementById('btnFit').addEventListener('click', fitCamera);

// Screenshot
document.getElementById('btnScreenshot').addEventListener('click', function() {
    renderer.render(scene, camera);
    const link = document.createElement('a');
    link.download = 'rhino-elevation.png';
    link.href = renderer.domElement.toDataURL('image/png');
    link.click();
});

// Load Building 5 directly from desktop
document.getElementById('btnLoadBuilding5').addEventListener('click', function() {
    updateStatus('Loading Building 5.3dm from server...');
    showLoading(true);
    hideDropzone();

    fetch('/rhino-file/Building 5.3dm')
        .then(function(resp) {
            if (!resp.ok) throw new Error('File not found. Use "Load .3dm File" button instead.');
            return resp.arrayBuffer();
        })
        .then(function(buffer) {
            loadFile(buffer, 'Building 5.3dm');
        })
        .catch(function(err) {
            showLoading(false);
            updateStatus('Could not auto-load: ' + err.message + '<br>Use the "Load .3dm File" button to browse manually.');
        });
});

// Resize
window.addEventListener('resize', function() {
    const aspect = window.innerWidth / window.innerHeight;
    
    // Update perspective camera
    perspectiveCamera.aspect = aspect;
    perspectiveCamera.updateProjectionMatrix();
    
    // Update orthographic camera
    if (loadedObject) {
        const box = new THREE.Box3().setFromObject(loadedObject);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const zoom = maxDim * 0.6;
        orthographicCamera.left = -zoom * aspect;
        orthographicCamera.right = zoom * aspect;
        orthographicCamera.top = zoom;
        orthographicCamera.bottom = -zoom;
        orthographicCamera.updateProjectionMatrix();
    }
    
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animate
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

updateStatus('Ready. Load a .3dm file to begin.');
</script>

</body>
</html>
